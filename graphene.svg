<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Diamond built from bars like the E1 logo style -->
  <g transform="translate(100,100) rotate(45)">
    <!-- Left vertical bar -->
    <rect x="-72" y="-72" width="30" height="144" rx="8" fill="#2a2a2a"/>
    <!-- Right vertical bar -->
    <rect x="42" y="-72" width="30" height="144" rx="8" fill="#2a2a2a"/>
    <!-- Top horizontal bar (shorter - creates G opening) -->
    <rect x="-72" y="-72" width="100" height="30" rx="8" fill="#2a2a2a"/>
    <!-- Bottom horizontal bar (full width) -->
    <rect x="-72" y="42" width="144" height="30" rx="8" fill="#2a2a2a"/>
    <!-- Middle horizontal bar (G crossbar - right side only) -->
    <rect x="-5" y="-15" width="77" height="30" rx="8" fill="#2a2a2a"/>
  </g>
</svg>
